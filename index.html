<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css'>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Roboto Mono', monospace;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.clock-container {
  background-color: #EDE9B7;
  width: 240px;
  height: 260px;
  border-radius: 18px;
  padding: 10px;
  box-shadow: 6px 6px #b65a2a;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* 🔥 PROGRESS RING */
.progress-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: auto;
}

.progress-ring {
  transform: rotate(-90deg);
}

.progress-ring circle {
  fill: none;
  stroke-width: 8;
}

.bg {
  stroke: #f3dcdc;
}

.progress {
  stroke: #F8C8DC;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}

/* TIME INSIDE CIRCLE */
#time-left {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
}

/* LABEL + CONTROLS */
#display-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#timer-label {
  font-size: 12px;
  background-color: #F8C8DC;
  padding: 4px 8px;
  border-radius: 8px;
}

#timer-ssr {
  display: flex;
  gap: 6px;
}

button {
  background-color: #E8AFAF;
  border: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  box-shadow: 2px 2px #b56b6b;
}

/* LENGTH BOXES */
.length-container {
  display: flex;
  justify-content: space-between;
  gap: 6px;
}

.break-container, 
.session-container {
  width: 48%;
  text-align: center;
  border: 1.5px solid #E8AFAF;
  padding: 5px;
  border-radius: 10px;
}

.timer-length {
  font-size: 16px;
}

.inc-dec-btn-container {
  display: flex;
  justify-content: center;
  gap: 5px;
}
</style>
</head>

<body>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@17/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const SESSION = "Session";
const BREAK = "Break";
const RADIUS = 50;
const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

class App extends React.Component {
  state = {
    breakLen: 5,
    sessionLen: 25,
    timeLeft: 1500,
    timerType: SESSION,
    isRunning: false,
    interval: null,
    totalTime: 1500
  };

  formatTime = () => {
    let m = Math.floor(this.state.timeLeft / 60);
    let s = this.state.timeLeft % 60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  };

  getProgress = () => {
    const progress = this.state.timeLeft / this.state.totalTime;
    return CIRCUMFERENCE * (1 - progress);
  };

  startStop = () => {
    if (!this.state.isRunning) {
      let interval = setInterval(() => {
        this.setState(prev => {
          if (prev.timeLeft === 0) {
            let newType = prev.timerType === SESSION ? BREAK : SESSION;
            let newTime = newType === SESSION ? prev.sessionLen*60 : prev.breakLen*60;
            return {
              timerType: newType,
              timeLeft: newTime,
              totalTime: newTime
            };
          }
          return { timeLeft: prev.timeLeft - 1 };
        });
      },1000);

      this.setState({ isRunning: true, interval });
    } else {
      clearInterval(this.state.interval);
      this.setState({ isRunning: false });
    }
  };

  reset = () => {
    clearInterval(this.state.interval);
    this.setState({
      breakLen: 5,
      sessionLen: 25,
      timeLeft: 1500,
      totalTime: 1500,
      timerType: SESSION,
      isRunning: false
    });
  };

  changeBreak = (val) => {
    if (!this.state.isRunning) {
      this.setState(prev => ({
        breakLen: Math.min(60, Math.max(1, prev.breakLen + val))
      }));
    }
  };

  changeSession = (val) => {
    if (!this.state.isRunning) {
      this.setState(prev => {
        let newLen = Math.min(60, Math.max(1, prev.sessionLen + val));
        return {
          sessionLen: newLen,
          timeLeft: prev.timerType === SESSION ? newLen*60 : prev.timeLeft,
          totalTime: newLen*60
        };
      });
    }
  };

  render() {
    return (
      <div className="clock-container">

        <div className="progress-wrapper">
          <svg className="progress-ring" width="120" height="120">
            <circle className="bg" r={RADIUS} cx="60" cy="60" />
            <circle
              className="progress"
              r={RADIUS}
              cx="60"
              cy="60"
              strokeDasharray={CIRCUMFERENCE}
              strokeDashoffset={this.getProgress()}
            />
          </svg>
          <div id="time-left">{this.formatTime()}</div>
        </div>

        <div id="display-controls">
          <div id="timer-label">{this.state.timerType}</div>
          <div id="timer-ssr">
            <button onClick={this.startStop}>
              <i className={this.state.isRunning ? "fa fa-pause" : "fa fa-play"}></i>
            </button>
            <button onClick={this.reset}>
              <i className="fa fa-refresh"></i>
            </button>
          </div>
        </div>

        <div className="length-container">
          <div className="break-container">
            <div>Break</div>
            <div className="timer-length">{this.state.breakLen}</div>
            <div className="inc-dec-btn-container">
              <button onClick={()=>this.changeBreak(1)}>↑</button>
              <button onClick={()=>this.changeBreak(-1)}>↓</button>
            </div>
          </div>

          <div className="session-container">
            <div>Session</div>
            <div className="timer-length">{this.state.sessionLen}</div>
            <div className="inc-dec-btn-container">
              <button onClick={()=>this.changeSession(1)}>↑</button>
              <button onClick={()=>this.changeSession(-1)}>↓</button>
            </div>
          </div>
        </div>

      </div>
    );
  }
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>

</body>
</html>
